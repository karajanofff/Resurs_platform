{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold">Fanlar</h2>
<div class="mt-6 grid gap-6 lg:grid-cols-[360px_1fr]">
  <form method="post" class="rounded-xl border bg-white p-5">
    <h3 class="font-semibold">Fan qo'shish</h3>
    <input name="name" required placeholder="Fan nomi" class="mt-4 w-full rounded-lg border px-3 py-2">
    <textarea name="description" placeholder="Tavsif" class="mt-3 w-full rounded-lg border px-3 py-2"></textarea>
    <button class="mt-3 rounded-lg bg-emerald-800 px-4 py-2 text-white">Saqlash</button>
  </form>
  <div class="rounded-xl border bg-white p-5">
    {% for subject in subjects %}
    <div class="border-b py-3 last:border-0"><p class="font-semibold">{{ subject.name }}</p><p class="text-sm text-slate-500">{{ subject.description }}</p></div>
    {% endfor %}
  </div>
</div>
{% endblock %}
