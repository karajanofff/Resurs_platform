{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold">NLP natijalar</h2>
<div class="mt-5 overflow-x-auto rounded-xl border">
  <table class="w-full text-left text-sm">
    <thead class="bg-slate-50"><tr><th class="p-3">Resurs</th><th>Foiz</th><th>Status</th><th>Tavsiya</th></tr></thead>
    <tbody>{% for item in resources %}<tr class="border-t"><td class="p-3">{{ item.title }}</td><td>{{ item.similarity_score }}%</td><td>{{ item.status }}</td><td>{{ item.recommendation }}</td></tr>{% endfor %}</tbody>
  </table>
</div>
{% endblock %}
