{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold">Tahlil natijasi</h2>
<div class="mt-6 max-w-3xl rounded-xl border bg-white p-5">
  <p class="text-sm text-slate-500">{{ subject.name }} · {{ topic.title }}</p>
  <h3 class="mt-2 text-xl font-semibold">{{ resource.title }}</h3>
  <div class="mt-5 h-3 overflow-hidden rounded-full bg-slate-200"><div class="h-full bg-emerald-700" style="width: {{ resource.similarity_score }}%"></div></div>
  <p class="mt-3 text-3xl font-bold">{{ resource.similarity_score }}%</p>
  <p class="mt-2 font-semibold">{{ resource.status }}</p>
  <p class="mt-4 text-slate-600">{{ resource.recommendation }}</p>
  <p class="mt-4 text-sm text-slate-500">Kalit so'zlar: {{ resource.keywords }}</p>
</div>
{% endblock %}
