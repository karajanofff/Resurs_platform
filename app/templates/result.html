{% extends "base.html" %}
{% block content %}
<section class="max-w-3xl rounded-xl border p-5">
  <h2 class="text-2xl font-bold">{{ resource.title }}</h2>
  <p class="mt-3">Fan: {{ subject.name }}</p>
  <p>Mavzu: {{ topic.title }}</p>
  <p class="mt-4 text-4xl font-bold">{{ resource.similarity_score }}%</p>
  <p class="mt-2 font-semibold">{{ resource.status }}</p>
  <div class="mt-4 h-3 rounded-full bg-slate-200"><div class="h-3 rounded-full bg-emerald-700" style="width: {{ resource.similarity_score }}%"></div></div>
  <p class="mt-5"><strong>Kalit so'zlar:</strong> {{ resource.keywords }}</p>
  <p class="mt-3">{{ resource.recommendation }}</p>
</section>
{% endblock %}
