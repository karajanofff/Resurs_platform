{% extends "base.html" %}
{% block content %}
<div class="mb-6">
  <p class="muted-label">Ma'lumotlar boshqaruvi</p>
  <h2 class="page-title mt-1 text-3xl font-bold">Mavzular</h2>
</div>
<div class="mt-6 grid gap-6 lg:grid-cols-[380px_1fr]">
  <form method="post" class="panel rounded-2xl p-5">
    <select name="subject_id" class="field">{% for subject in subjects %}<option value="{{ subject.id }}">{{ subject.name }}</option>{% endfor %}</select>
    <input name="title" required placeholder="Mavzu nomi" class="field mt-3">
    <textarea name="description" placeholder="Tavsif" class="field mt-3"></textarea>
    <textarea name="keywords" placeholder="Kalit so'zlar" class="field mt-3"></textarea>
    <button class="mt-3 rounded-lg bg-emerald-800 px-4 py-2 text-white">Saqlash</button>
  </form>
  <div class="panel rounded-2xl p-5">
    {% for topic in topics %}
    <div class="border-b py-3 last:border-0"><p class="font-semibold">{{ topic.title }}</p><p class="text-sm text-slate-500">{{ topic.description }}</p></div>
    {% endfor %}
  </div>
</div>
{% endblock %}
