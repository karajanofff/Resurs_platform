{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold">Mavzular</h2>
<div class="mt-6 grid gap-6 lg:grid-cols-[380px_1fr]">
  <form method="post" class="rounded-xl border bg-white p-5">
    <select name="subject_id" class="w-full rounded-lg border px-3 py-2">{% for subject in subjects %}<option value="{{ subject.id }}">{{ subject.name }}</option>{% endfor %}</select>
    <input name="title" required placeholder="Mavzu nomi" class="mt-3 w-full rounded-lg border px-3 py-2">
    <textarea name="description" placeholder="Tavsif" class="mt-3 w-full rounded-lg border px-3 py-2"></textarea>
    <textarea name="keywords" placeholder="Kalit so'zlar" class="mt-3 w-full rounded-lg border px-3 py-2"></textarea>
    <button class="mt-3 rounded-lg bg-emerald-800 px-4 py-2 text-white">Saqlash</button>
  </form>
  <div class="rounded-xl border bg-white p-5">
    {% for topic in topics %}
    <div class="border-b py-3 last:border-0"><p class="font-semibold">{{ topic.title }}</p><p class="text-sm text-slate-500">{{ topic.description }}</p></div>
    {% endfor %}
  </div>
</div>
{% endblock %}
