{% extends "base.html" %}
{% block public_content %}
<section class="hero-shell grid min-h-screen place-items-center p-5">
  <form method="post" class="auth-panel w-full max-w-md rounded-2xl p-6">
    <p class="eyebrow text-emerald-700">Xush kelibsiz</p>
    <h1 class="mt-3 text-3xl font-bold text-slate-950">Tizimga kirish</h1>
    {% if error %}<p class="mt-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error }}</p>{% endif %}
    <label class="mt-6 block text-sm font-medium text-slate-700">Email<input name="email" type="email" required class="field mt-2"></label>
    <label class="mt-4 block text-sm font-medium text-slate-700">Parol<input name="password" type="password" required class="field mt-2"></label>
    <button class="mt-5 w-full rounded-lg bg-emerald-800 px-4 py-3 font-semibold text-white transition hover:bg-emerald-900">Kirish</button>
    <div class="mt-5 rounded-xl bg-emerald-50 p-4 text-sm text-slate-700">
      <p class="font-semibold text-emerald-950">Demo loginlar</p>
      <p class="mt-2">Admin: admin@example.com / admin123</p>
      <p>O'qituvchi: teacher@example.com / teacher123</p>
      <p>Talaba: student@example.com / student123</p>
    </div>
  </form>
</section>
{% endblock %}
