{% extends "base.html" %}
{% block content %}
<section class="max-w-2xl rounded-xl border p-5">
  <h2 class="text-2xl font-bold">Resurs yuklash</h2>
  {% if error %}<p class="mt-4 text-red-600">{{ error }}</p>{% endif %}
  <form method="post" enctype="multipart/form-data" class="mt-5 grid gap-4">
    <input name="title" required placeholder="Resurs nomi" class="rounded-lg border px-3 py-2">
    <select name="subject_id" class="rounded-lg border px-3 py-2">{% for subject in subjects %}<option value="{{ subject.id }}">{{ subject.name }}</option>{% endfor %}</select>
    <select name="topic_id" class="rounded-lg border px-3 py-2">{% for topic in topics %}<option value="{{ topic.id }}">{{ topic.title }}</option>{% endfor %}</select>
    <input type="file" name="file" required accept=".pdf,.docx,.pptx,.txt" class="rounded-lg border px-3 py-2">
    <button class="rounded-lg bg-emerald-800 px-4 py-3 font-semibold text-white">NLP yordamida tahlil qilish</button>
  </form>
</section>
{% endblock %}
